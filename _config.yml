# Site settings
title: ten.primaadi.net | Short Share
description: "A minimal blog that share what I had to face as a developer."
url: "http://ten.primaadi.net"
author:
  name: "Prima Adi Pradana"
  email: "prima101112@gmail.com"
  url: "http://ten.primaadi.net"

# Build settings
baseurl: / # Change this to your relative path (ex: /blog/), or leave just a /
markdown: redcarpet
source: .
destination: ./_site
permalink: /:title
paginate: 10
paginate_path: /page:num/

# Default values
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Custom variables
version: "1.1.0"

# Options
custom_header: true
custom_nav_footer: false
reverse: false
